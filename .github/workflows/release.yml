name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag matches VERSION
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION is $version but tag is $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "Release version: $version"

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Windows resource compiler
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/akavel/rsrc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Test
        shell: bash
        run: go test ./...

      - name: Vet
        shell: bash
        run: |
          go vet ./...
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go vet ./...

      - name: Build executable
        shell: bash
        run: bash scripts/build_windows.sh

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/windows/ExcelImageConverter.exe release-assets/ExcelImageConverter-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: release-assets/*
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64
    runs-on: macos-14
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        shell: bash
        run: go test ./...

      - name: Build DMG
        shell: bash
        run: bash scripts/build_macos_dmg.sh

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/macos/ExcelImageConverter-mac-arm64.dmg release-assets/ExcelImageConverter-mac-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - build-windows
      - build-macos
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --verify-tag \
            --title "Excel Image Converter $GITHUB_REF_NAME" \
            --notes "自动构建发布。包含 Windows amd64 exe、macOS Apple Silicon dmg 和 SHA256 校验文件。"
