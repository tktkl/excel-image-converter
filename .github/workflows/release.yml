name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check tag matches VERSION
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$version" != "$tag" ]]; then
            echo "VERSION is $version but tag is $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "Release version: $version"

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Windows resource compiler
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/akavel/rsrc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Test
        shell: bash
        run: go test ./...

      - name: Vet
        shell: bash
        run: |
          go vet ./...
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go vet ./...

      - name: Build executable
        shell: bash
        run: bash scripts/build_windows.sh

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/windows/ExcelImageConverter.exe release-assets/ExcelImageConverter-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: release-assets/*
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64
    runs-on: macos-14
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        shell: bash
        run: go test ./...

      - name: Build DMG
        shell: bash
        run: bash scripts/build_macos_dmg.sh

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp dist/macos/ExcelImageConverter-mac-arm64.dmg release-assets/ExcelImageConverter-mac-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - build-windows
      - build-macos
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.RELEASE_REPOSITORY;
          const tag = process.env.RELEASE_TAG;
          const assetDir = "release-assets";
          const [owner, repo] = repository.split("/");
          const apiBase = `https://api.github.com/repos/${owner}/${repo}`;

          function apiHeaders(extra = {}) {
            return {
              Authorization: `Bearer ${token}`,
              Accept: "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "excel-image-converter-release",
              ...extra,
            };
          }

          async function request(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: apiHeaders(options.headers || {}),
            });
            const text = await response.text();
            if (!response.ok) {
              throw new Error(`${options.method || "GET"} ${url} failed with ${response.status}: ${text}`);
            }
            return text ? JSON.parse(text) : null;
          }

          async function getReleaseByTag() {
            const response = await fetch(`${apiBase}/releases/tags/${encodeURIComponent(tag)}`, {
              headers: apiHeaders(),
            });
            if (response.status === 404) {
              return null;
            }
            const text = await response.text();
            if (!response.ok) {
              throw new Error(`GET release by tag failed with ${response.status}: ${text}`);
            }
            return JSON.parse(text);
          }

          let release = await getReleaseByTag();
          if (!release) {
            release = await request(`${apiBase}/releases`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                tag_name: tag,
                name: `Excel Image Converter ${tag}`,
                body: "自动构建发布。包含 Windows amd64 exe、macOS Apple Silicon dmg 和 SHA256 校验文件。",
              }),
            });
          }

          const files = fs.readdirSync(assetDir)
            .map((name) => path.join(assetDir, name))
            .filter((file) => fs.statSync(file).isFile());

          const existingAssets = release.assets || [];
          for (const file of files) {
            const name = path.basename(file);
            const existing = existingAssets.find((asset) => asset.name === name);
            if (existing) {
              await request(existing.url, { method: "DELETE" });
            }

            const data = fs.readFileSync(file);
            const uploadURL = `${release.upload_url.replace(/\{.*\}$/, "")}?name=${encodeURIComponent(name)}`;
            await request(uploadURL, {
              method: "POST",
              headers: {
                "Content-Type": "application/octet-stream",
                "Content-Length": String(data.length),
              },
              body: data,
            });
            console.log(`Uploaded ${name}`);
          }
          NODE
